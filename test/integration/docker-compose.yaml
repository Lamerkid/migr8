services:
  postgres:
    container_name: "postgres"
    image: "postgres:18.2"
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: migration_user
      POSTGRES_PASSWORD: migrate
      POSTGRES_DB: migr8_test
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U migration_user"]
      interval: 5s
      timeout: 5s
      retries: 3
