name: CI tests

on: [push, pull_request]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v2.10.1

      - name: Unit tests
        run: go test -v -race -count=100 -timeout=1m ./...

      - name: Integration tests
        run: go test -v -count=1 -timeout=1m -tags integration ./...
